<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Funcionarios</title>
    <link rel="stylesheet" href="styles.css">
    <title>Gerenciador de Funcionários</title> 
</head>
<body>
    <h1>Gerenciador de Funcionários</h1>
    <main>
        <div class="container">
        <form action="">
            <div class="dadosFuncionario">
                <p>Informe os dados do Funcionário</p>
                <div class="nome">
                    <label for="nomeFuncionario">Nome</label>
                    <input type="text" name="nomeFuncionario" id="nomeFuncionario">
                </div>
                <div class="cargo">
                    <label for="cargoFuncionario">Cargo</label>
                    <input type="text" name="cargoFuncionario" id="cargoFuncionario">
                </div>
                <div class="salario">
                    <label for="salFuncionario">Salário</label>
                    <input type="text" name="salFuncionario" id="salFuncionario">
                </div>
                <button type="submit">Cadastrar</button>
            </div>
        </form>
        <section id="exibeFuncionarios"></section>
    </div>
    <script src="script.js"></script>
</main>
</body>
</html>
